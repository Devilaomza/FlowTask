services:
  # Backend FastAPI service
  - type: web
    name: flowtask-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false

  # Frontend Next.js service (Static Site)
  - type: static
    name: flowtask-frontend
    env: static
    plan: free
    buildCommand: npm run build
    publishDir: out
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: flowtask-backend
          type: web
          property: host
